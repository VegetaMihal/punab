<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PUNAB Card Studio</title>

<!-- Google Fonts: editorial serif + bold grotesque + clean sans -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,600;1,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<!-- Bengali (Bangla) coverage: routes Bengali codepoints to fitted webfonts while Latin stays in the brand fonts -->
<link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;500;600;700;800&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet" />

<!-- html2canvas for high-resolution PNG export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --ui-bg:#0e1217;
    --ui-panel:#161b22;
    --ui-panel-2:#1c232c;
    --ui-line:#2a323d;
    --ui-text:#e7ecf2;
    --ui-muted:#93a0b0;
    --ui-accent:#d8b24a;
    --ui-accent-2:#3b82f6;
    --radius:14px;
    font-family:'Manrope',system-ui,-apple-system,'Anek Bangla',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ui-bg);color:var(--ui-text);}
  body{-webkit-font-smoothing:antialiased;}

  /* ---------- App shell ---------- */
  .app{display:flex;flex-direction:column;min-height:100vh;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:14px 22px;border-bottom:1px solid var(--ui-line);
    background:linear-gradient(180deg,#11161d,#0e1217);position:sticky;top:0;z-index:30;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-badge{
    width:42px;height:42px;border-radius:10px;background:#fff;display:flex;
    align-items:center;justify-content:center;padding:5px;box-shadow:0 2px 10px rgba(0,0,0,.4);
  }
  .brand-badge img{width:100%;height:100%;object-fit:contain;}
  .brand h1{font-family:'Archivo','Anek Bangla',sans-serif;font-weight:800;font-size:16px;letter-spacing:.3px;margin:0;line-height:1;}
  .brand p{margin:3px 0 0;font-size:11px;color:var(--ui-muted);letter-spacing:.4px;}
  .topbar-actions{display:flex;gap:10px;align-items:center;}

  .workspace{display:grid;grid-template-columns:1fr 420px;gap:0;flex:1;min-height:0;}
  @media (max-width:980px){
    .workspace{grid-template-columns:1fr;}
  }

  /* ---------- Preview stage ---------- */
  .stage-wrap{
    position:relative;display:flex;flex-direction:column;align-items:center;
    padding:30px 24px 40px;overflow:auto;
    background:
      radial-gradient(900px 500px at 50% -10%, #1a212b 0%, transparent 60%),
      #0b0e13;
  }
  .stage-tools{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;justify-content:center;}
  .stage{display:flex;align-items:flex-start;justify-content:center;width:100%;}
  .card-scaler{transform-origin:top center;}

  /* ---------- Controls ---------- */
  .panel{
    background:var(--ui-panel);border-left:1px solid var(--ui-line);
    overflow-y:auto;padding:0 0 60px;
  }
  @media (max-width:980px){
    .panel{border-left:none;border-top:1px solid var(--ui-line);}
    .stage-wrap{padding:22px 14px 30px;}
  }
  .sec{border-bottom:1px solid var(--ui-line);padding:18px 20px;}
  .sec h2{
    font-family:'Archivo','Anek Bangla',sans-serif;font-size:11px;font-weight:800;letter-spacing:1.4px;
    text-transform:uppercase;color:var(--ui-muted);margin:0 0 14px;
  }
  .field{margin-bottom:13px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--ui-muted);margin-bottom:5px;letter-spacing:.2px;}
  .field input[type=text],.field textarea{
    width:100%;background:var(--ui-panel-2);border:1px solid var(--ui-line);
    border-radius:9px;color:var(--ui-text);font-family:inherit;font-size:13.5px;
    padding:9px 11px;resize:vertical;transition:border-color .15s,box-shadow .15s;
  }
  .field textarea{min-height:62px;line-height:1.45;}
  .field input:focus,.field textarea:focus{
    outline:none;border-color:var(--ui-accent);box-shadow:0 0 0 3px rgba(216,178,74,.16);
  }
  .field .hint{font-size:10.5px;color:#6f7c8c;margin-top:4px;}

  /* template chips */
  .templates{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .tpl{
    text-align:left;cursor:pointer;border:1px solid var(--ui-line);background:var(--ui-panel-2);
    border-radius:11px;padding:11px 12px;color:var(--ui-text);transition:.15s;position:relative;
  }
  .tpl:hover{border-color:#3c4756;transform:translateY(-1px);}
  .tpl.active{border-color:var(--ui-accent);background:linear-gradient(180deg,rgba(216,178,74,.14),rgba(216,178,74,.04));box-shadow:0 0 0 1px var(--ui-accent) inset;}
  .tpl .tnum{font-family:'Archivo','Anek Bangla',sans-serif;font-size:10px;font-weight:800;color:var(--ui-accent);letter-spacing:.5px;}
  .tpl .ttl{font-weight:700;font-size:12.5px;margin-top:3px;line-height:1.2;}

  /* theme swatches */
  .themes{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .theme-sw{cursor:pointer;border:1px solid var(--ui-line);border-radius:10px;padding:7px;background:var(--ui-panel-2);transition:.15s;}
  .theme-sw:hover{border-color:#3c4756;}
  .theme-sw.active{border-color:#fff;box-shadow:0 0 0 1px #fff inset;}
  .theme-sw .bar{height:26px;border-radius:6px;display:flex;overflow:hidden;}
  .theme-sw .bar span{flex:1;}
  .theme-sw .nm{font-size:10px;color:var(--ui-muted);margin-top:5px;text-align:center;font-weight:600;letter-spacing:.2px;}

  /* segmented toggle */
  .seg{display:flex;background:var(--ui-panel-2);border:1px solid var(--ui-line);border-radius:10px;padding:3px;gap:3px;}
  .seg button{flex:1;border:none;background:transparent;color:var(--ui-muted);font-family:inherit;font-weight:700;font-size:12px;padding:8px 6px;border-radius:7px;cursor:pointer;transition:.15s;}
  .seg button.active{background:var(--ui-accent);color:#1a1407;}

  /* sliders */
  .slider-row{display:flex;align-items:center;gap:10px;}
  .slider-row input[type=range]{flex:1;accent-color:var(--ui-accent);}
  .slider-row .val{font-size:11px;color:var(--ui-muted);width:42px;text-align:right;font-variant-numeric:tabular-nums;}

  /* buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
    border-radius:10px;font-family:'Archivo','Anek Bangla',sans-serif;font-weight:700;font-size:13px;letter-spacing:.3px;
    padding:11px 16px;border:1px solid transparent;transition:.15s;white-space:nowrap;
  }
  .btn-primary{background:var(--ui-accent);color:#1a1407;width:100%;font-size:14px;padding:13px;}
  .btn-primary:hover{filter:brightness(1.06);transform:translateY(-1px);}
  .btn-primary:active{transform:translateY(0);}
  .btn-ghost{background:var(--ui-panel-2);color:var(--ui-text);border-color:var(--ui-line);}
  .btn-ghost:hover{border-color:#3c4756;}
  .btn-sm{padding:8px 12px;font-size:12px;}
  .btn-row{display:flex;gap:9px;}

  /* upload control */
  .uploader{display:flex;gap:9px;align-items:center;}
  .uploader .thumb{width:46px;height:46px;border-radius:9px;border:1px solid var(--ui-line);background:#0c0f14 center/cover no-repeat;flex:none;}
  .uploader label.up{flex:1;}
  input[type=file]{display:none;}

  .note{font-size:11px;color:#6f7c8c;line-height:1.5;}
  .spinner{position:fixed;inset:0;background:rgba(8,10,14,.7);display:flex;align-items:center;justify-content:center;z-index:80;flex-direction:column;gap:14px;color:#fff;font-family:'Archivo','Anek Bangla',sans-serif;font-weight:700;letter-spacing:.5px;}
  .spinner .ring{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--ui-accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* =====================================================================
     CARD DESIGN SYSTEM  (rendered at native 1080px, scaled for preview)
     Each .card uses theme CSS variables set inline on the root.
     ===================================================================== */
  .card{
    position:relative;overflow:hidden;color:var(--c-light);width:100%;height:100%;
    font-family:'Manrope','Anek Bangla',sans-serif;background:var(--c-bg);
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  .card *{box-sizing:border-box;}

  /* shared logo lockup (white badge) */
  .logo-lockup{display:flex;align-items:center;gap:18px;}
  .logo-badge{background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;}
  .logo-badge img{display:block;object-fit:contain;}
  .lock-name{font-family:'Archivo','Anek Bangla',sans-serif;font-weight:900;letter-spacing:1px;line-height:1;}
  .lock-sub{font-family:'Manrope','Anek Bangla',sans-serif;font-weight:600;letter-spacing:3px;text-transform:uppercase;opacity:.85;}

  .photo{position:absolute;inset:0;background-repeat:no-repeat;}
  .photo-frame{position:relative;overflow:hidden;}

  .kicker{
    display:inline-flex;align-items:center;gap:10px;white-space:nowrap;font-family:'Archivo','Anek Bangla',sans-serif;font-weight:800;
    text-transform:uppercase;letter-spacing:2.5px;background:var(--c-accent);color:var(--c-ink);
  }
  .headline{font-family:'Archivo','Anek Bangla',sans-serif;font-weight:900;line-height:1.26;letter-spacing:-.5px;padding-bottom:.06em;}
  .desc{font-family:'Manrope','Anek Bangla',sans-serif;font-weight:500;line-height:1.5;color:var(--c-light);opacity:.92;}
  .rule{height:5px;width:96px;background:var(--c-accent);border-radius:4px;}

  .quote-mark{font-family:'Playfair Display','Tiro Bangla',Georgia,serif;font-weight:900;color:var(--c-accent);line-height:.7;}
  .serif{font-family:'Playfair Display','Tiro Bangla',Georgia,serif;}
</style>
</head>

/* Bengali-friendly auto-fit: shrinks font-size until the text fits maxHeight,
   so long quotes/headlines expand to fit the area instead of overflowing or
   getting clipped. Works during PNG export (html2canvas reads the live DOM). */
function FitText({ children, max = 42, min = 20, maxHeight, style = {}, className }) {
  const ref = useRef(null);
  useLayoutEffect(() => {
    const el = ref.current;
    if (!el || !maxHeight) return;
    let s = max;
    el.style.fontSize = s + 'px';
    while (s > min && el.scrollHeight > maxHeight) { s -= 1; el.style.fontSize = s + 'px'; }
  });
  return <div ref={ref} className={className} style={{ ...style, fontSize: max }}>{children}</div>;
}

        <label className="btn btn-ghost btn-sm up" htmlFor={id}>{src ? 'Change' : 'Upload'}</label>
        <input id={id} type="file" accept="image/*" onChange={(e) => {
          const f = e.target.files[0];if (!f) return;
          const r = new FileReader();r.onload = () => onFile(r.result);r.readAsDataURL(f);

        }} />

      </div>
    </div>);

}

/* helpers */
function cardVars(t) {return { '--c-bg': t.bg, '--c-bg2': t.bg2, '--c-accent': t.accent, '--c-ink': t.ink, '--c-light': t.light, '--c-muted': t.muted };}
function hexA(hex, a) {
  if (!hex || hex[0] !== '#') return hex;
  let h = hex.slice(1);if (h.length === 3) h = h.split('').map((c) => c + c).join('');
  const r = parseInt(h.slice(0, 2), 16),g = parseInt(h.slice(2, 4), 16),b = parseInt(h.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

const RENDERERS = { news1: TplNews1, news2: TplNews2, indiv: TplIndiv, group: TplGroup, quote: TplQuote, event: TplEvent, edu: TplEdu, poll: TplPoll, speaker: TplSpeaker, recruit: TplRecruit, notice: TplNotice, resp: TplResp };
const NO_PHOTO = ['edu', 'poll', 'notice']; // templates that don't use a photo

/* =========================================================================
   APP
   ========================================================================= */
function App() {
  const [template, setTemplate] = useState('news1');
  const [themeKey, setThemeKey] = useState('premium');
  const [formatKey, setFormatKey] = useState('portrait');
  const [fields, setFields] = useState({ ...DEFAULT_FIELDS });
  const [images, setImages] = useState(() => Object.fromEntries(TEMPLATES.map((tp) => [tp.id, { ...DEFAULT_IMG }])));
  const [logo, setLogo] = useState(window.PUNAB_LOGO);
  const [scale, setScale] = useState(0.4);
  const [busy, setBusy] = useState(false);

  const stageRef = useRef(null);
  const cardRef = useRef(null);

  const t = THEMES[themeKey];
  const fmt = FORMATS[formatKey];
  const Renderer = RENDERERS[template];
  const img = images[template];

  const setF = (k, v) => setFields((s) => ({ ...s, [k]: v }));
  const setImg = (patch) => setImages((s) => ({ ...s, [template]: { ...s[template], ...patch } }));

  /* fit preview card to stage width */
  useEffect(() => {
    function fit() {
      if (!stageRef.current) return;
      const mobile = window.innerWidth <= 980;
      const availW = stageRef.current.clientWidth - 8;
      const availH = mobile ? window.innerHeight * 0.58 : window.innerHeight - 196;
      setScale(Math.max(0.12, Math.min(availW / fmt.w, availH / fmt.h, 0.72)));
    }
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [fmt.w, fmt.h]);

  /* export high-res PNG */
  const download = useCallback(async () => {
    if (!cardRef.current) return;
    setBusy(true);
    // Reset the preview's scale() transform during capture — html2canvas
    // renders duplicated/offset text when an ancestor is CSS-transformed.
    const scaler = cardRef.current.parentElement;
    const prevTransform = scaler.style.transform;
    try {
      await (document.fonts ? document.fonts.ready : Promise.resolve());
      await new Promise((r) => setTimeout(r, 60));
      scaler.style.transform = 'none';
      const canvas = await html2canvas(cardRef.current, {
        scale: 2, useCORS: true, backgroundColor: null, logging: false,
        width: fmt.w, height: fmt.h, windowWidth: fmt.w, windowHeight: fmt.h
      });
      scaler.style.transform = prevTransform;
      const link = document.createElement('a');
      link.download = `PUNAB-${template}-${formatKey}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (e) {scaler.style.transform = prevTransform;console.error(e);alert('Export failed: ' + e.message);}
    setBusy(false);
  }, [fmt.w, fmt.h, template, formatKey]);

  const resetCard = () => {
    setFields({ ...DEFAULT_FIELDS });
    setImg({ ...DEFAULT_IMG });
  };

  return (
    <div className="app">
      {busy && <div className="spinner"><div className="ring" />RENDERING HIGH-RES PNG…</div>}

      <div className="topbar">
        <div className="brand">
          <div className="brand-badge"><img src={logo} alt="PUNAB" /></div>
          <div>
            <h1>PUNAB CARD STUDIO</h1>
            <p>Premium social cards · Unity • Mobilizing • Progress</p>
          </div>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-ghost btn-sm" onClick={resetCard}>Reset</button>
          <button className="btn btn-primary" style={{ width: 'auto', padding: '11px 20px' }} onClick={download}>↓ Download PNG</button>
        </div>
      </div>

      <div className="workspace">
        {/* ---------- PREVIEW ---------- */}
        <div className="stage-wrap">
          <div className="stage-tools">
            <div className="seg" style={{ minWidth: 260 }}>
              {Object.entries(FORMATS).map(([k, v]) =>
              <button key={k} className={formatKey === k ? 'active' : ''} onClick={() => setFormatKey(k)}>{k === 'portrait' ? 'Portrait 4:5' : 'Square 1:1'}</button>
              )}
            </div>
          </div>
          <div className="stage" ref={stageRef} style={{ height: fmt.h * scale + 4 }}>
            <div className="card-scaler" style={{ transform: `scale(${scale})`, width: fmt.w, height: fmt.h }}>
              <div ref={cardRef} style={{ width: fmt.w, height: fmt.h }}>
                <Renderer f={fields} img={img} logo={logo} t={t} fmt={fmt} />
              </div>
            </div>
          </div>
        </div>

        {/* ---------- CONTROLS ---------- */}
        <div className="panel">
          <div className="sec">
            <h2>Template</h2>
            <div className="templates">
              {TEMPLATES.map((tp) =>
              <button key={tp.id} className={'tpl' + (template === tp.id ? ' active' : '')} onClick={() => setTemplate(tp.id)}>
                  <div className="tnum">TEMPLATE {tp.num}</div>
                  <div className="ttl">{tp.title}</div>
                </button>
              )}
            </div>
          </div>

          <div className="sec">
            <h2>Color Theme</h2>
            <div className="themes">
              {Object.entries(THEMES).map(([k, th]) =>
              <div key={k} className={'theme-sw' + (themeKey === k ? ' active' : '')} onClick={() => setThemeKey(k)}>
                  <div className="bar">{th.swatch.map((c, i) => <span key={i} style={{ background: c }} />)}</div>
                  <div className="nm">{th.name}</div>
                </div>
              )}
            </div>
          </div>

          {/* dynamic content fields */}
          <div className="sec">
            <h2>Content</h2>
            <ContentFields template={template} fields={fields} setF={setF} />
          </div>

          {/* photo controls */}
          {!NO_PHOTO.includes(template) &&
          <div className="sec">
            <h2>{template === 'event' || template === 'recruit' ? 'Photo (optional)' : 'Photo'}</h2>
            <Uploader label="Main image" src={img.src} onFile={(src) => setImg({ src })} onClear={() => setImg({ ...DEFAULT_IMG })} />
            {template !== 'quote' && <div className="seg" style={{ marginBottom: 13 }}>
              {['cover', 'contain'].map((o) =>
              <button key={o} className={img.fit === o ? 'active' : ''} onClick={() => setImg({ fit: o })}>{o === 'cover' ? 'Fill (cover)' : 'Fit (contain)'}</button>
              )}
            </div>}
            <Slider label="Zoom" min={1} max={2.6} step={0.02} value={img.zoom} onChange={(v) => setImg({ zoom: v })} fmt={(v) => v.toFixed(2) + '×'} />
            {(img.fit === 'cover' || template === 'quote') && <>
              <Slider label="Position — horizontal" min={0} max={100} step={1} value={img.x} onChange={(v) => setImg({ x: v })} fmt={(v) => v + '%'} />
              {template !== 'quote' && <Slider label="Position — vertical" min={0} max={100} step={1} value={img.y} onChange={(v) => setImg({ y: v })} fmt={(v) => v + '%'} />}
            </>}
          </div>
          }

          {/* logo */}
          <div className="sec">
            <h2>Logo</h2>
            <Uploader label="PUNAB logo" src={logo} onFile={setLogo} onClear={() => setLogo(window.PUNAB_LOGO)} />
            <div className="note">The logo sits inside a white badge on every card for clean, professional visibility on any background.</div>
          </div>

          {/* export */}
          <div className="sec">
            <h2>Export</h2>
            <button className="btn btn-primary" onClick={download}>↓ Download High-Res PNG</button>
            <div className="note" style={{ marginTop: 10 }}>Exports at {fmt.w * 2}×{fmt.h * 2}px (2× of {fmt.label}). Includes your photo, logo, text and design.</div>
            <div className="btn-row" style={{ marginTop: 12 }}>
              <button className="btn btn-ghost btn-sm" style={{ flex: 1 }} onClick={resetCard}>Reset card</button>
            </div>
          </div>
        </div>
      </div>
    </div>);

}

/* dynamic fields per template */
function ContentFields({ template, fields, setF }) {
  const f = fields;
  if (template === 'news1' || template === 'news2') {
    return <>
      <Field label="Category / Tag" value={f.category} onChange={(v) => setF('category', v)} maxLen={28} />
      <Field label="Date" value={f.date} onChange={(v) => setF('date', v)} maxLen={28} />
      <Field label="Headline" value={f.headline} onChange={(v) => setF('headline', v)} multi hint="Max ~10 words · shows on 2–3 lines" maxLen={90} />
      <Field label="Short description" value={f.description} onChange={(v) => setF('description', v)} multi hint="2–3 lines" maxLen={180} />
    </>;
  }
  if (template === 'indiv') {
    return <>
      <Field label="Name" value={f.congratsName} onChange={(v) => setF('congratsName', v)} maxLen={32} />
      <Field label="Achievement title" value={f.achievementTitle} onChange={(v) => setF('achievementTitle', v)} maxLen={60} />
      <Field label="Achievement description" value={f.achievementDesc} onChange={(v) => setF('achievementDesc', v)} multi maxLen={180} />
      <Field label="University / Organization" value={f.orgName} onChange={(v) => setF('orgName', v)} maxLen={48} />
    </>;
  }
  if (template === 'group') {
    return <>
      <Field label="Team / Group name" value={f.groupName} onChange={(v) => setF('groupName', v)} maxLen={40} />
      <Field label="Achievement title" value={f.achievementTitle} onChange={(v) => setF('achievementTitle', v)} maxLen={60} />
      <Field label="Achievement description" value={f.achievementDesc} onChange={(v) => setF('achievementDesc', v)} multi maxLen={180} />
      <Field label="University / Organization" value={f.orgName} onChange={(v) => setF('orgName', v)} maxLen={48} />
    </>;
  }
  // quote
  if (template === 'quote') {
    return <>
    <Field label="Quote" value={f.quote} onChange={(v) => setF('quote', v)} multi hint="The main focus of the card" maxLen={220} />
    <Field label="Name" value={f.quoteName} onChange={(v) => setF('quoteName', v)} maxLen={32} />
    <Field label="Designation" value={f.designation} onChange={(v) => setF('designation', v)} maxLen={40} />
    <Field label="University / Organization" value={f.quoteOrg} onChange={(v) => setF('quoteOrg', v)} maxLen={48} />
  </>;
  }
  if (template === 'event') {
    return <>
      <Field label="Reminder label" value={f.reminderLabel} onChange={(v) => setF('reminderLabel', v)} hint="e.g. Happening Tomorrow · Today · 2 Days Left" maxLen={28} />
      <Field label="Event title" value={f.eventTitle} onChange={(v) => setF('eventTitle', v)} multi maxLen={70} />
      <Field label="Date" value={f.eventDate} onChange={(v) => setF('eventDate', v)} maxLen={28} />
      <Field label="Time" value={f.eventTime} onChange={(v) => setF('eventTime', v)} maxLen={28} />
      <Field label="Venue / Platform" value={f.eventVenue} onChange={(v) => setF('eventVenue', v)} maxLen={28} />
      <Field label="Call to action" value={f.eventCta} onChange={(v) => setF('eventCta', v)} maxLen={30} />
      <Field label="Link / QR text (optional)" value={f.eventLink} onChange={(v) => setF('eventLink', v)} maxLen={36} />
    </>;
  }
  if (template === 'edu') {
    return <>
      <Field label="Category label (optional)" value={f.eduCategory} onChange={(v) => setF('eduCategory', v)} maxLen={24} />
      <Field label="Carousel topic / title" value={f.eduTopic} onChange={(v) => setF('eduTopic', v)} maxLen={48} />
      <Field label="Slide number" value={f.eduSlideNo} onChange={(v) => setF('eduSlideNo', v)} hint="e.g. 01 / 05 — drives the number badge & dots" maxLen={12} />
      <Field label="Main point / title" value={f.eduPoint} onChange={(v) => setF('eduPoint', v)} multi maxLen={40} />
      <Field label="Explanation text" value={f.eduText} onChange={(v) => setF('eduText', v)} multi maxLen={180} />
      <Field label="Tip / highlight (optional)" value={f.eduTip} onChange={(v) => setF('eduTip', v)} multi maxLen={90} />
    </>;
  }
  if (template === 'poll') {
    return <>
      <Field label="Category label (optional)" value={f.pollCategory} onChange={(v) => setF('pollCategory', v)} maxLen={24} />
      <Field label="Question headline" value={f.pollQuestion} onChange={(v) => setF('pollQuestion', v)} multi maxLen={80} />
      <Field label="Option A" value={f.pollA} onChange={(v) => setF('pollA', v)} maxLen={40} />
      <Field label="Option B" value={f.pollB} onChange={(v) => setF('pollB', v)} maxLen={40} />
      <Field label="Option C (optional)" value={f.pollC} onChange={(v) => setF('pollC', v)} maxLen={40} />
      <Field label="Option D (optional)" value={f.pollD} onChange={(v) => setF('pollD', v)} maxLen={40} />
      <Field label="Instruction" value={f.pollInstruction} onChange={(v) => setF('pollInstruction', v)} maxLen={40} />
    </>;
  }
  if (template === 'speaker') {
    return <>
      <Field label="Label (optional)" value={f.speakerLabel} onChange={(v) => setF('speakerLabel', v)} hint="e.g. Guest Speaker · Chief Guest · Panelist" maxLen={24} />
      <Field label="Name" value={f.speakerName} onChange={(v) => setF('speakerName', v)} maxLen={32} />
      <Field label="Designation" value={f.speakerDesignation} onChange={(v) => setF('speakerDesignation', v)} maxLen={40} />
      <Field label="Organization / University" value={f.speakerOrg} onChange={(v) => setF('speakerOrg', v)} maxLen={48} />
      <Field label="Topic / Session title" value={f.speakerTopic} onChange={(v) => setF('speakerTopic', v)} maxLen={56} />
      <Field label="Event name" value={f.speakerEvent} onChange={(v) => setF('speakerEvent', v)} maxLen={56} />
      <Field label="Date & time" value={f.speakerDateTime} onChange={(v) => setF('speakerDateTime', v)} maxLen={40} />
    </>;
  }
  if (template === 'recruit') {
    return <>
      <Field label="Main title" value={f.recTitle} onChange={(v) => setF('recTitle', v)} hint="e.g. Join PUNAB" maxLen={22} />
      <Field label="Position / Wing" value={f.recPosition} onChange={(v) => setF('recPosition', v)} maxLen={44} />
      <Field label="Who can apply" value={f.recWho} onChange={(v) => setF('recWho', v)} multi maxLen={110} />
      <Field label="Benefits / description" value={f.recBenefits} onChange={(v) => setF('recBenefits', v)} multi maxLen={120} />
      <Field label="Deadline" value={f.recDeadline} onChange={(v) => setF('recDeadline', v)} maxLen={28} />
      <Field label="CTA button text" value={f.recCta} onChange={(v) => setF('recCta', v)} maxLen={20} />
      <Field label="Apply link / QR text" value={f.recApply} onChange={(v) => setF('recApply', v)} maxLen={32} />
      <Field label="Contact info" value={f.recContact} onChange={(v) => setF('recContact', v)} maxLen={32} />
    </>;
  }
  if (template === 'notice') {
    return <>
      <Field label="Notice category" value={f.noticeCategory} onChange={(v) => setF('noticeCategory', v)} hint="e.g. Official Notice" maxLen={26} />
      <Field label="Date" value={f.noticeDate} onChange={(v) => setF('noticeDate', v)} maxLen={28} />
      <Field label="Notice title" value={f.noticeTitle} onChange={(v) => setF('noticeTitle', v)} multi maxLen={56} />
      <Field label="Main notice paragraph" value={f.noticeBody} onChange={(v) => setF('noticeBody', v)} multi maxLen={260} />
      <Field label="Instruction / action required" value={f.noticeAction} onChange={(v) => setF('noticeAction', v)} multi maxLen={120} />
      <Field label="Authorized by — name" value={f.noticeAuthName} onChange={(v) => setF('noticeAuthName', v)} maxLen={32} />
      <Field label="Authorized by — designation" value={f.noticeAuthDesig} onChange={(v) => setF('noticeAuthDesig', v)} maxLen={40} />
      <Field label="Contact / email (optional)" value={f.noticeContact} onChange={(v) => setF('noticeContact', v)} maxLen={40} />
    </>;
  }
  // resp — Responsible Person
  return <>
    <Field label="Main title" value={f.respTitle} onChange={(v) => setF('respTitle', v)} hint="e.g. New Responsibility Assigned" maxLen={32} />
    <Field label="Person name" value={f.respName} onChange={(v) => setF('respName', v)} maxLen={32} />
    <Field label="New role / designation" value={f.respRole} onChange={(v) => setF('respRole', v)} maxLen={40} />
    <Field label="Wing / Department" value={f.respWing} onChange={(v) => setF('respWing', v)} maxLen={44} />
    <Field label="Responsibility description" value={f.respDesc} onChange={(v) => setF('respDesc', v)} multi maxLen={150} />
    <Field label="Effective date" value={f.respDate} onChange={(v) => setF('respDate', v)} maxLen={32} />
    <Field label="Welcome message" value={f.respWelcome} onChange={(v) => setF('respWelcome', v)} multi maxLen={110} />
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
